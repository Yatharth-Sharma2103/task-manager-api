spring:
  application:
    name: task-manager-api
  # Default profile uses an in-memory H2 database so the app runs out of the box.
  # Switch to PostgreSQL or MySQL with: --spring.profiles.active=postgres | mysql
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:h2}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

# ---------------------------------------------------------------------------
# Application specific configuration
# ---------------------------------------------------------------------------
app:
  jwt:
    # IMPORTANT: override this with a strong, Base64-encoded 256-bit secret in production.
    secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
    # Access token validity in milliseconds (default: 24 hours)
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ai:
    # provider: "heuristic" (offline, no key required) or "openai" (requires api-key)
    provider: ${AI_PROVIDER:heuristic}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      model: ${OPENAI_MODEL:gpt-4o-mini}
  reminders:
    # Enable/disable the @Scheduled deadline reminder job
    enabled: ${REMINDERS_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.example.taskmanager: INFO
